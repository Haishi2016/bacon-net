    <div style="text-align: center; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-family: Arial, sans-serif; margin-bottom: 10px; border-radius: 8px;">
        <h2 style="margin: 0 0 8px 0; font-size: 24px;">Learned Tree for: 3.14*b+10*c-3*a</h2>
        <div style="font-size: 14px; opacity: 0.95;"><b>Expression:</b> <code>(0.50*(0.50*a * 0.50*b) + 0.50*c)</code> &nbsp;|&nbsp; <b>R²:</b> 0.8866</div>

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',

              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#4CAF50", "font": {"color": "white"}, "id": "input_0", "label": "a", "level": 0, "shape": "circle", "size": 30, "title": "Input: a"}, {"color": "#4CAF50", "font": {"color": "white"}, "id": "input_1", "label": "b", "level": 0, "shape": "circle", "size": 30, "title": "Input: b"}, {"color": "#4CAF50", "font": {"color": "white"}, "id": "input_2", "label": "c", "level": 0, "shape": "circle", "size": 30, "title": "Input: c"}, {"color": "#FF9800", "font": {"color": "white"}, "id": "coeff_0_0", "label": "\u00d70.05", "level": 1, "shape": "circle", "size": 25, "title": "Coefficient: 0.0452"}, {"color": "#FF9800", "font": {"color": "white"}, "id": "coeff_0_1", "label": "\u00d70.83", "level": 1, "shape": "circle", "size": 25, "title": "Coefficient: 0.8317"}, {"color": "#FF9800", "font": {"color": "white"}, "id": "coeff_0_2", "label": "\u00d74.03", "level": 1, "shape": "circle", "size": 25, "title": "Coefficient: 4.0344"}, {"color": "#2196F3", "font": {"color": "white"}, "id": "agg_0_0", "label": "mul", "level": 2, "shape": "circle", "size": 35, "title": "Operator: mul (100%)\u003cbr\u003eRouting: fixed"}, {"color": "#2196F3", "font": {"color": "white"}, "id": "agg_0_1", "label": "add", "level": 2, "shape": "circle", "size": 35, "title": "Operator: add (100%)\u003cbr\u003eRouting: fixed"}, {"color": "#FF9800", "font": {"color": "white"}, "id": "coeff_1_0", "label": "\u00d70.05", "level": 3, "shape": "circle", "size": 25, "title": "Coefficient: 0.0452"}, {"color": "#FF9800", "font": {"color": "white"}, "id": "coeff_1_1", "label": "\u00d72.13", "level": 3, "shape": "circle", "size": 25, "title": "Coefficient: 2.1271"}, {"color": "#2196F3", "font": {"color": "white"}, "id": "agg_1_0", "label": "add", "level": 4, "shape": "circle", "size": 35, "title": "Operator: add (100%)\u003cbr\u003eRouting: fixed"}, {"color": "#9C27B0", "font": {"color": "white"}, "id": "output", "label": "Output", "level": 5, "shape": "circle", "size": 30, "title": "Final output"}]);
                  edges = new vis.DataSet([{"arrows": "to", "color": "rgba(100, 100, 100, 0.5)", "dashes": true, "from": "input_0", "title": "Fixed 1:1", "to": "coeff_0_0", "width": 2}, {"arrows": "to", "color": "rgba(100, 100, 100, 0.5)", "dashes": true, "from": "input_1", "title": "Fixed 1:1", "to": "coeff_0_1", "width": 2}, {"arrows": "to", "color": "rgba(100, 100, 100, 0.5)", "dashes": true, "from": "input_2", "title": "Fixed 1:1", "to": "coeff_0_2", "width": 2}, {"arrows": "to", "color": "rgba(100, 100, 100, 0.6)", "dashes": true, "from": "coeff_0_0", "title": "Weight: 1.000 (fixed)", "to": "agg_0_0", "width": 2}, {"arrows": "to", "color": "rgba(100, 100, 100, 0.6)", "dashes": true, "from": "coeff_0_1", "title": "Weight: 1.000 (fixed)", "to": "agg_0_1", "width": 2}, {"arrows": "to", "color": "rgba(100, 100, 100, 0.6)", "dashes": true, "from": "coeff_0_2", "title": "Weight: 1.000 (fixed)", "to": "agg_0_1", "width": 2}, {"arrows": "to", "color": "rgba(100, 100, 100, 0.5)", "dashes": true, "from": "agg_0_0", "title": "Fixed 1:1", "to": "coeff_1_0", "width": 2}, {"arrows": "to", "color": "rgba(100, 100, 100, 0.5)", "dashes": true, "from": "agg_0_1", "title": "Fixed 1:1", "to": "coeff_1_1", "width": 2}, {"arrows": "to", "color": "rgba(100, 100, 100, 0.6)", "dashes": true, "from": "coeff_1_0", "title": "Weight: 1.000 (fixed)", "to": "agg_1_0", "width": 2}, {"arrows": "to", "color": "rgba(100, 100, 100, 0.6)", "dashes": true, "from": "coeff_1_1", "title": "Weight: 1.000 (fixed)", "to": "agg_1_0", "width": 2}, {"arrows": "to", "color": "rgba(156, 39, 176, 0.6)", "dashes": true, "from": "agg_1_0", "title": "Output", "to": "output", "width": 2}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"enabled": true, "hierarchicalRepulsion": {"centralGravity": 0.0, "springLength": 150, "springConstant": 0.01, "nodeDistance": 120}, "solver": "hierarchicalRepulsion"}, "layout": {"hierarchical": {"enabled": true, "direction": "UD", "sortMethod": "directed", "levelSeparation": 120, "nodeSpacing": 100}}, "interaction": {"dragNodes": true, "dragView": true, "zoomView": true, "hover": true}, "edges": {"smooth": {"enabled": true, "type": "cubicBezier"}}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
