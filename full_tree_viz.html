        <center>
          <h1>BACON Full Tree (Interactive)</h1>

        <style type="text/css">

             #mynetwork {
                 width: 100%;
                 height: 860px;
                 background-color: #fafafa;
                 border: 1px solid lightgray;
                 position: relative;
                 float: left;
             }

    <body>
        <div class="card" style="width: 100%">
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#4CAF50", "font": {"color": "#1f2937"}, "id": "L0_0", "label": "A", "level": 0, "shape": "ellipse", "size": 28, "title": "Input: A"}, {"color": "#4CAF50", "font": {"color": "#1f2937"}, "id": "L0_1", "label": "B", "level": 0, "shape": "ellipse", "size": 28, "title": "Input: B"}, {"color": "#4CAF50", "font": {"color": "#1f2937"}, "id": "L0_2", "label": "C", "level": 0, "shape": "ellipse", "size": 28, "title": "Input: C"}, {"color": "#2196F3", "font": {"color": "#1f2937"}, "id": "L1_0", "label": "or", "level": 1, "shape": "ellipse", "size": 32, "title": "Layer 1 Node 0\u003cbr\u003eOperator: or\u003cbr\u003eConfidence: 0.9925\u003cbr\u003eAndness: 0.2802"}, {"color": "#2196F3", "font": {"color": "#1f2937"}, "id": "L1_1", "label": "and", "level": 1, "shape": "ellipse", "size": 32, "title": "Layer 1 Node 1\u003cbr\u003eOperator: and\u003cbr\u003eConfidence: 0.8752\u003cbr\u003eAndness: 1.6324"}, {"color": "#9C27B0", "font": {"color": "#1f2937"}, "id": "L2_0", "label": "and", "level": 2, "shape": "ellipse", "size": 32, "title": "Layer 2 Node 0\u003cbr\u003eOperator: and\u003cbr\u003eConfidence: 0.9939\u003cbr\u003eAndness: -0.3326"}]);
                  edges = new vis.DataSet([{"arrows": "to", "color": "rgba(33,150,243,1.000)", "from": "L0_0", "title": "Select: 1.0000\u003cbr\u003eScale: 1.0000", "to": "L1_0", "width": 6.0}, {"arrows": "to", "color": "rgba(33,150,243,1.000)", "from": "L0_1", "title": "Select: 1.0000\u003cbr\u003eScale: 1.0000", "to": "L1_0", "width": 6.0}, {"arrows": "to", "color": "rgba(33,150,243,1.000)", "from": "L0_2", "title": "Select: 1.0000\u003cbr\u003eScale: 1.0000", "to": "L1_1", "width": 6.0}, {"arrows": "to", "color": "rgba(33,150,243,1.000)", "from": "L1_0", "title": "Select: 1.0000\u003cbr\u003eScale: 1.0000", "to": "L2_0", "width": 6.0}, {"arrows": "to", "color": "rgba(33,150,243,1.000)", "from": "L1_1", "title": "Select: 1.0000\u003cbr\u003eScale: 1.0000", "to": "L2_0", "width": 6.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"enabled": true, "hierarchicalRepulsion": {"centralGravity": 0.0, "springLength": 170, "springConstant": 0.01, "nodeDistance": 130}, "solver": "hierarchicalRepulsion"}, "layout": {"hierarchical": {"enabled": true, "direction": "UD", "sortMethod": "directed", "levelSeparation": 130, "nodeSpacing": 110}}, "interaction": {"dragNodes": true, "dragView": true, "zoomView": true, "hover": true}, "edges": {"smooth": {"enabled": true, "type": "cubicBezier"}}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
