    <body>

    <div style="text-align: center; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-family: Arial, sans-serif; margin-bottom: 10px; border-radius: 8px;">
        <h2 style="margin: 0 0 8px 0; font-size: 24px;">BACON Alternating Tree (Interactive)</h2>

    </div>
    
        <div class="card" style="width: 100%">
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#4CAF50", "font": {"color": "white"}, "id": "input_0", "label": "A", "level": 0, "shape": "circle", "size": 30, "title": "Input: A"}, {"color": "#4CAF50", "font": {"color": "white"}, "id": "input_1", "label": "B", "level": 0, "shape": "circle", "size": 30, "title": "Input: B"}, {"color": "#4CAF50", "font": {"color": "white"}, "id": "input_2", "label": "C", "level": 0, "shape": "circle", "size": 30, "title": "Input: C"}, {"color": "#FF9800", "font": {"color": "white"}, "id": "coeff_0_0", "label": "\u00d71.00", "level": 1, "shape": "circle", "size": 25, "title": "Coefficient: 1.0000"}, {"color": "#FF9800", "font": {"color": "white"}, "id": "coeff_0_1", "label": "\u00d71.00", "level": 1, "shape": "circle", "size": 25, "title": "Coefficient: 1.0000"}, {"color": "#FF9800", "font": {"color": "white"}, "id": "coeff_0_2", "label": "\u00d71.00", "level": 1, "shape": "circle", "size": 25, "title": "Coefficient: 1.0000"}, {"color": "#2196F3", "font": {"color": "white"}, "id": "agg_0_0", "label": "or", "level": 2, "shape": "circle", "size": 35, "title": "Operator: or (100%)\u003cbr\u003eRouting: learned"}, {"color": "#2196F3", "font": {"color": "white"}, "id": "agg_0_1", "label": "and", "level": 2, "shape": "circle", "size": 35, "title": "Operator: and (83%)\u003cbr\u003eRouting: learned"}, {"color": "#FF9800", "font": {"color": "white"}, "id": "coeff_1_0", "label": "\u00d71.00", "level": 3, "shape": "circle", "size": 25, "title": "Coefficient: 1.0000"}, {"color": "#FF9800", "font": {"color": "white"}, "id": "coeff_1_1", "label": "\u00d71.00", "level": 3, "shape": "circle", "size": 25, "title": "Coefficient: 1.0000"}, {"color": "#2196F3", "font": {"color": "white"}, "id": "agg_1_0", "label": "and", "level": 4, "shape": "circle", "size": 35, "title": "Operator: and (94%)\u003cbr\u003eRouting: learned"}, {"color": "#9C27B0", "font": {"color": "white"}, "id": "output", "label": "Output", "level": 5, "shape": "circle", "size": 30, "title": "Final output"}]);
                  edges = new vis.DataSet([{"arrows": "to", "color": "rgba(100, 100, 100, 0.5)", "dashes": true, "from": "input_0", "title": "Fixed 1:1", "to": "coeff_0_0", "width": 2}, {"arrows": "to", "color": "rgba(100, 100, 100, 0.5)", "dashes": true, "from": "input_1", "title": "Fixed 1:1", "to": "coeff_0_1", "width": 2}, {"arrows": "to", "color": "rgba(100, 100, 100, 0.5)", "dashes": true, "from": "input_2", "title": "Fixed 1:1", "to": "coeff_0_2", "width": 2}, {"arrows": "to", "color": "rgba(33, 150, 243, 1.0)", "dashes": false, "from": "coeff_0_0", "title": "Weight: 1.000 (learned)", "to": "agg_0_0", "width": 5.0}, {"arrows": "to", "color": "rgba(33, 150, 243, 1.0)", "dashes": false, "from": "coeff_0_1", "title": "Weight: 1.000 (learned)", "to": "agg_0_0", "width": 5.0}, {"arrows": "to", "color": "rgba(33, 150, 243, 1.0)", "dashes": false, "from": "coeff_0_2", "title": "Weight: 1.000 (learned)", "to": "agg_0_1", "width": 5.0}, {"arrows": "to", "color": "rgba(100, 100, 100, 0.5)", "dashes": true, "from": "agg_0_0", "title": "Fixed 1:1", "to": "coeff_1_0", "width": 2}, {"arrows": "to", "color": "rgba(100, 100, 100, 0.5)", "dashes": true, "from": "agg_0_1", "title": "Fixed 1:1", "to": "coeff_1_1", "width": 2}, {"arrows": "to", "color": "rgba(33, 150, 243, 1.0)", "dashes": false, "from": "coeff_1_0", "title": "Weight: 1.000 (learned)", "to": "agg_1_0", "width": 5.0}, {"arrows": "to", "color": "rgba(33, 150, 243, 1.0)", "dashes": false, "from": "coeff_1_1", "title": "Weight: 1.000 (learned)", "to": "agg_1_0", "width": 5.0}, {"arrows": "to", "color": "rgba(156, 39, 176, 0.6)", "dashes": true, "from": "agg_1_0", "title": "Output", "to": "output", "width": 2}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"enabled": true, "hierarchicalRepulsion": {"centralGravity": 0.0, "springLength": 150, "springConstant": 0.01, "nodeDistance": 120}, "solver": "hierarchicalRepulsion"}, "layout": {"hierarchical": {"enabled": true, "direction": "UD", "sortMethod": "directed", "levelSeparation": 120, "nodeSpacing": 100}}, "interaction": {"dragNodes": true, "dragView": true, "zoomView": true, "hover": true}, "edges": {"smooth": {"enabled": true, "type": "cubicBezier"}}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
